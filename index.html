<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#f3f7ff" />
  <title>İnfüzyon Hesaplayıcı</title>

  <style>
    :root {
      --bg: #f3f7ff;
      --card: #ffffff;
      --border: #dbe4f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #e8f0ff;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.10);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
    }

    body {
      padding: 16px;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .top {
      padding: 22px;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
      border-bottom: 1px solid var(--border);
    }

    .title {
      margin: 0 0 10px 0;
      font-size: 24px;
      font-weight: 800;
      text-align: center;
    }

    .result-box {
      background: var(--accent-soft);
      border: 1px solid #c8d9ff;
      border-radius: 18px;
      padding: 16px;
      text-align: center;
    }

    .result {
      font-size: 34px;
      font-weight: 900;
      color: var(--accent);
    }

    .sub {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .content {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    input {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 18px;
    }

    input:focus {
      border-color: var(--accent);
      outline: none;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      background: #f8fafc;
      border-radius: 12px;
      padding: 10px;
      border: 1px solid var(--border);
    }

    /* PREMIUM FOOTER */
    .footer-note {
      text-align: center;
      margin-top: 25px;
    }

    .signature-line {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #2563eb, transparent);
      margin: 20px auto 12px;
    }

    .footer-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1.2px;
    }

    .footer-rights {
      font-size: 11px;
      margin-top: 6px;
      color: #94a3b8;
    }

    .footer-mail {
      font-size: 12px;
      margin-top: 6px;
      color: #475569;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="card">
      <div class="top">
        <h1 class="title">İnfüzyon Hesaplayıcı</h1>

        <div class="result-box">
          <div class="result" id="result">—</div>
          <div class="sub" id="sub">Değerleri gir</div>
        </div>
      </div>

      <div class="content">

        <div class="field">
          <label>İlaç (mg)</label>
          <input id="mg" type="number" placeholder="4">
        </div>

        <div class="field">
          <label>Hız (mL/saat)</label>
          <input id="rate" type="number" placeholder="5">
        </div>

        <div class="field">
          <label>Kilo (kg)</label>
          <input id="kg" type="number" placeholder="70">
        </div>

        <div class="field">
          <label>Toplam hacim (mL)</label>
          <input id="vol" type="number" value="50">
        </div>

        <div class="hint">
          mcg/kg/dk = [(mg × 1000) / mL] × (mL/saat) / (kg × 60)
        </div>

      </div>
    </div>

    <!-- PREMIUM SIGNATURE -->
    <div class="footer-note">
      <div class="signature-line"></div>
      <div class="footer-name">Dr. Gökhan Karataş</div>
      <div class="footer-rights">© 2026 All Rights Reserved</div>
      <div class="footer-mail">dr.gokhankaratas@gmail.com</div>
    </div>

  </div>

  <script>
    const mg = document.getElementById('mg');
    const rate = document.getElementById('rate');
    const kg = document.getElementById('kg');
    const vol = document.getElementById('vol');
    const result = document.getElementById('result');
    const sub = document.getElementById('sub');

    function calc() {
      const m = parseFloat(mg.value);
      const r = parseFloat(rate.value);
      const k = parseFloat(kg.value);
      const v = parseFloat(vol.value);

      if ([m,r,k,v].some(x => isNaN(x))) {
        result.innerText = "—";
        return;
      }

      const mcgml = (m * 1000) / v;
      const mch = mcgml * r;
      const final = mch / (k * 60);

      result.innerText = final.toFixed(4) + " mcg/kg/dk";
      sub.innerText = "Kons: " + mcgml.toFixed(2) + " mcg/mL";
    }

    [mg,rate,kg,vol].forEach(e => e.addEventListener("input", calc));
  </script>

</body>
</html>
